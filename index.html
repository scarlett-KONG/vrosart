<!DOCTYPE html>
<html>
<head>
    <title>Rosagrata Vanessa</title>
    <script>
        (function() {
            // 默认语言
            var defaultLang = 'en';

            // 支持的语言列表
            var supportedLangs = ['en', 'fr'];

            // 从浏览器设置中获取首选语言，并取前两位（如 'fr-FR' 变成 'fr'）
            var browserLang = (navigator.language || navigator.userLanguage).substr(0, 2);

            // 检查浏览器语言是否在支持列表中
            var lang = supportedLangs.indexOf(browserLang) > -1 ? browserLang : defaultLang;

            // 跳转到对应语言的首页
            window.location.replace('/' + lang + '/');
        })();
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
